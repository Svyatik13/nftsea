version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nftsea_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nftsea
      POSTGRES_USER: nftsea
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: nftsea_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nftsea_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://nftsea:${DB_PASSWORD}@postgres:5432/nftsea
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      - internal
      - web

  nginx:
    image: nginx:alpine
    container_name: nftsea_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - web

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
